<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Night Explorer — Sleep Viz</title>
  <link rel="stylesheet" href="../shared/style.css">
  <style>
    .filter-bar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .filter-bar input[type="text"] {
      font-family: var(--font-body);
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      outline: none;
      min-width: 160px;
      transition: border-color var(--transition);
    }

    .filter-bar input[type="text"]:focus {
      border-color: var(--accent-muted);
    }

    .filter-bar input[type="text"]::placeholder {
      color: var(--text-dim);
    }

    .filter-badge {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .night-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border-subtle);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .night-row {
      background: var(--bg-card);
      cursor: pointer;
      transition: background var(--transition);
      overflow: hidden;
    }

    .night-row:hover .night-header {
      background: var(--bg-hover);
    }

    .night-row.expanded .night-header {
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border-subtle);
    }

    .night-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 1rem;
      height: 34px;
      transition: background var(--transition);
    }

    .night-date {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      min-width: 100px;
      flex-shrink: 0;
    }

    .night-strip {
      flex: 1;
      height: 16px;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .night-strip canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .night-stats {
      display: flex;
      gap: 1.25rem;
      flex-shrink: 0;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .night-stats span {
      white-space: nowrap;
    }

    .night-stats .val {
      color: var(--text-muted);
    }

    .night-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: var(--bg-card);
    }

    .night-row.expanded .night-detail {
      max-height: 500px;
    }

    .night-detail-inner {
      padding: 1rem 1rem 1.25rem;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.75rem;
      font-family: var(--font-body);
      font-size: 0.7rem;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      cursor: pointer;
      transition: all var(--transition);
      z-index: 5;
    }

    .close-btn:hover {
      color: var(--text);
      border-color: var(--accent-muted);
    }

    .detail-stats {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .detail-stat {
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .detail-stat .val {
      font-family: var(--font-mono);
      color: var(--text-muted);
      font-weight: 400;
    }

    .channel-label {
      font-size: 0.55rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      fill: var(--text-dim);
    }
  </style>
</head>
<body>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="../shared/utils.js"></script>
  <script>
    document.body.innerHTML = pageShell(
      'Night <em>Explorer</em>',
      'Click any night to expand a full multi-channel view. Overview first, details on demand.',
      'Interactive'
    );
    document.querySelector('.page').classList.add('page-wide');

    const root = document.getElementById('viz-root');
    root.innerHTML = `
      <div class="filter-bar" id="filter-bar">
        <input type="text" id="search-input" placeholder="Search date (e.g. Jan, 2026, Mon)...">
        <select class="control-select" id="sort-select">
          <option value="date-desc">Newest first</option>
          <option value="date-asc">Oldest first</option>
          <option value="sleep-desc">Most sleep</option>
          <option value="sleep-asc">Least sleep</option>
          <option value="eff-desc">Best efficiency</option>
          <option value="eff-asc">Worst efficiency</option>
        </select>
        <span class="filter-badge" id="count-badge"></span>
      </div>
      <div id="legend-bar"></div>
      <div class="night-list" id="night-list">
        <div class="loading">Loading sleep data</div>
      </div>
    `;

    const STAGE_COLS = { 0: '#2563eb', 1: '#5b9bd5', 2: '#c45a8a', 3: '#d4a54a', '-1': '#3a3a4a' };
    const TIME_MIN = 19;
    const TIME_MAX = 34;

    Promise.all([loadData('summary.json'), loadData('nights_all.json')]).then(([summary, nightsAll]) => {
      const summaryByDate = Object.fromEntries(summary.map(s => [s.date, s]));
      const allDates = Object.keys(nightsAll).sort().reverse();
      let expandedDate = null;
      let currentTooltip = null;

      const listEl = document.getElementById('night-list');
      const searchInput = document.getElementById('search-input');
      const sortSelect = document.getElementById('sort-select');
      const countBadge = document.getElementById('count-badge');

      makeLegend(document.getElementById('legend-bar'), [0, 1, 2, 3]);

      function getFilteredDates() {
        const q = searchInput.value.toLowerCase().trim();
        const sortMode = sortSelect.value;

        let dates = allDates.filter(date => {
          const night = nightsAll[date];
          if (!night || !night.levels || night.levels.length === 0) return false;
          if (!q) return true;
          const s = summaryByDate[date];
          const dateObj = new Date(date + 'T12:00:00');
          const searchStr = [
            date,
            dateObj.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }),
            dateObj.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }),
            s ? s.dayOfWeek : '',
          ].join(' ').toLowerCase();
          return searchStr.includes(q);
        });

        dates.sort((a, b) => {
          const sa = summaryByDate[a] || {};
          const sb = summaryByDate[b] || {};
          switch (sortMode) {
            case 'date-asc': return a.localeCompare(b);
            case 'date-desc': return b.localeCompare(a);
            case 'sleep-desc': return (sb.totalSleep || 0) - (sa.totalSleep || 0);
            case 'sleep-asc': return (sa.totalSleep || 0) - (sb.totalSleep || 0);
            case 'eff-desc': return (sb.efficiency || 0) - (sa.efficiency || 0);
            case 'eff-asc': return (sa.efficiency || 0) - (sb.efficiency || 0);
            default: return 0;
          }
        });

        return dates;
      }

      function renderList() {
        const dates = getFilteredDates();
        countBadge.textContent = `${dates.length} nights`;
        listEl.innerHTML = '';

        if (!dates.length) {
          listEl.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-dim);font-size:0.85rem">No matching nights</div>';
          return;
        }

        dates.forEach(date => {
          const night = nightsAll[date];
          const s = summaryByDate[date] || {};
          const row = document.createElement('div');
          row.className = 'night-row';
          row.dataset.date = date;

          if (date === expandedDate) row.classList.add('expanded');

          const header = document.createElement('div');
          header.className = 'night-header';

          const dateLabel = document.createElement('span');
          dateLabel.className = 'night-date';
          dateLabel.textContent = formatDateLong(date);

          const strip = document.createElement('div');
          strip.className = 'night-strip';

          const statsDiv = document.createElement('div');
          statsDiv.className = 'night-stats';
          statsDiv.innerHTML = `
            <span><span class="val">${formatDuration(s.totalSleep || 0)}</span> sleep</span>
            <span><span class="val">${s.efficiency != null ? Math.round(s.efficiency) + '%' : '—'}</span> eff</span>
          `;

          header.appendChild(dateLabel);
          header.appendChild(strip);
          header.appendChild(statsDiv);

          const detail = document.createElement('div');
          detail.className = 'night-detail';

          row.appendChild(header);
          row.appendChild(detail);
          listEl.appendChild(row);

          drawStrip(strip, night.levels);

          header.addEventListener('click', () => toggleExpand(row, date));
        });

        if (expandedDate) {
          const expandedRow = listEl.querySelector(`[data-date="${expandedDate}"]`);
          if (expandedRow) {
            renderDetail(expandedRow, expandedDate);
          }
        }
      }

      function drawStrip(container, levels) {
        const canvas = document.createElement('canvas');
        const w = 600;
        const h = 16;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = '100%';
        canvas.style.height = h + 'px';
        container.appendChild(canvas);

        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);

        const xScale = (hour) => ((hour - TIME_MIN) / (TIME_MAX - TIME_MIN)) * w;

        ctx.fillStyle = '#15151f';
        ctx.fillRect(0, 0, w, h);

        levels.forEach(l => {
          const x1 = Math.max(0, xScale(l.start));
          const x2 = Math.min(w, xScale(l.end));
          if (x2 <= x1) return;
          ctx.fillStyle = STAGE_COLS[l.stage] || STAGE_COLS[1];
          ctx.fillRect(x1, 0, x2 - x1, h);
        });
      }

      function toggleExpand(row, date) {
        if (currentTooltip) { currentTooltip.hide(); currentTooltip = null; }

        if (expandedDate === date) {
          row.classList.remove('expanded');
          row.querySelector('.night-detail').innerHTML = '';
          expandedDate = null;
          return;
        }

        const prev = listEl.querySelector('.night-row.expanded');
        if (prev) {
          prev.classList.remove('expanded');
          prev.querySelector('.night-detail').innerHTML = '';
        }

        expandedDate = date;
        row.classList.add('expanded');
        renderDetail(row, date);
      }

      function renderDetail(row, date) {
        const detail = row.querySelector('.night-detail');
        const night = nightsAll[date];
        const s = night.summary;

        const inner = document.createElement('div');
        inner.className = 'night-detail-inner';

        const closeBtn = document.createElement('button');
        closeBtn.className = 'close-btn';
        closeBtn.textContent = 'Close';
        closeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleExpand(row, date);
        });
        inner.appendChild(closeBtn);

        const statsRow = document.createElement('div');
        statsRow.className = 'detail-stats';
        const stats = [
          ['Sleep', formatDuration(s.totalSleep)],
          ['Deep', formatDuration(s.deep)],
          ['REM', formatDuration(s.rem)],
          ['Efficiency', Math.round(s.efficiency) + '%'],
          ['Avg HR', s.avgHR != null ? Math.round(s.avgHR) + ' bpm' : '—'],
          ['Battery', s.bodyBatteryChange != null ? (s.bodyBatteryChange >= 0 ? '+' : '') + s.bodyBatteryChange : '—'],
          ['Stress', s.avgStress != null ? Math.round(s.avgStress) : '—'],
        ];
        stats.forEach(([label, val]) => {
          const el = document.createElement('span');
          el.className = 'detail-stat';
          el.innerHTML = `<span class="val">${val}</span> ${label}`;
          statsRow.appendChild(el);
        });
        inner.appendChild(statsRow);

        const chartDiv = document.createElement('div');
        chartDiv.style.position = 'relative';
        inner.appendChild(chartDiv);
        detail.innerHTML = '';
        detail.appendChild(inner);

        requestAnimationFrame(() => drawDetailChart(chartDiv, night));
      }

      function drawDetailChart(container, night) {
        const levels = night.levels || [];
        const hr = (night.hr || []).filter(p => p.v != null);
        const stress = (night.stress || []).filter(p => p.v != null);
        const battery = (night.battery || []).filter(p => p.v != null);
        const movement = (night.movement || []).filter(p => p.v != null);
        const respiration = (night.respiration || []).filter(p => p.v != null);

        const allH = [
          ...levels.flatMap(l => [l.start, l.end]),
          ...hr.map(p => p.h),
          ...stress.map(p => p.h),
          ...battery.map(p => p.h),
          ...movement.map(p => p.h),
          ...respiration.map(p => p.h),
        ];
        if (!allH.length) return;

        const hMin = d3.min(allH);
        const hMax = d3.max(allH);

        const width = 1200;
        const margin = { left: 72, right: 40 };
        const innerW = width - margin.left - margin.right;

        const channelH = 50;
        const gap = 4;
        const hypH = 60;
        const channels = ['hyp', 'hr', 'stress', 'battery', 'movement', 'respiration'];
        const topPad = 8;
        const timeAxisH = 22;
        const totalH = topPad + hypH + gap + 5 * (channelH + gap) + timeAxisH;

        const svg = d3.select(container)
          .append('svg')
          .attr('viewBox', `0 0 ${width} ${totalH}`)
          .attr('width', '100%')
          .attr('preserveAspectRatio', 'xMidYMid meet');

        const x = d3.scaleLinear().domain([hMin, hMax]).range([margin.left, width - margin.right]);

        const STAGE_Y_MAP = { 0: 3, 1: 2, 2: 1, 3: 0 };
        const STAGE_LABELS = ['Awake', 'REM', 'Light', 'Deep'];

        let yOff = topPad;

        // Hypnogram
        drawChannelHypnogram(svg, x, levels, yOff, hypH, margin, innerW);
        yOff += hypH + gap;

        // HR
        drawChannelLine(svg, x, hr, yOff, channelH, margin, 'Heart Rate', 'var(--hr-color)', null, 'bpm');
        yOff += channelH + gap;

        // Stress
        drawChannelLine(svg, x, stress, yOff, channelH, margin, 'Stress', 'var(--stress-color)', null, '');
        yOff += channelH + gap;

        // Body Battery
        drawChannelArea(svg, x, battery, yOff, channelH, margin, 'Body Battery', 'var(--battery-color)', [0, 100]);
        yOff += channelH + gap;

        // Movement
        drawChannelBars(svg, x, movement, yOff, channelH, margin, 'Movement', 'var(--accent)');
        yOff += channelH + gap;

        // Respiration
        drawChannelLine(svg, x, respiration, yOff, channelH, margin, 'Respiration', 'var(--resp-color)', null, 'brpm');
        yOff += channelH + gap;

        // Time axis
        const ticks = d3.range(Math.ceil(hMin), Math.floor(hMax) + 1, 1);
        const axis = d3.axisBottom(x)
          .tickValues(ticks)
          .tickFormat(d => formatHour(d))
          .tickSize(0);
        svg.append('g')
          .attr('class', 'axis')
          .attr('transform', `translate(0,${yOff})`)
          .call(axis)
          .call(g => g.select('.domain').remove())
          .call(g => g.selectAll('.tick text')
            .attr('fill', 'var(--text-dim)')
            .attr('font-size', '9px'));

        // Crosshair tooltip
        const tooltip = createTooltip(container);
        currentTooltip = tooltip;

        const crosshair = svg.append('line')
          .attr('y1', topPad)
          .attr('y2', yOff)
          .attr('stroke', 'var(--text-dim)')
          .attr('stroke-width', 0.5)
          .attr('stroke-dasharray', '2,2')
          .attr('opacity', 0);

        const overlay = svg.append('rect')
          .attr('x', margin.left)
          .attr('y', topPad)
          .attr('width', innerW)
          .attr('height', yOff - topPad)
          .attr('fill', 'none')
          .attr('pointer-events', 'all');

        const nearest = (arr, h) => {
          if (!arr.length) return null;
          let best = arr[0], bestD = Math.abs(arr[0].h - h);
          for (const p of arr) {
            const d = Math.abs(p.h - h);
            if (d < bestD) { best = p; bestD = d; }
          }
          return bestD < 0.25 ? best : null;
        };

        overlay.on('mousemove', function(event) {
          const [mx] = d3.pointer(event);
          const hour = x.invert(mx);

          crosshair
            .attr('x1', mx).attr('x2', mx)
            .attr('opacity', 1);

          let lines = [`<div class="tooltip-label">${formatHour(hour)}</div>`];

          const seg = levels.find(l => hour >= l.start && hour < l.end);
          if (seg) lines.push(`<div class="tooltip-value">${stageName(seg.stage)}</div>`);

          const hrPt = nearest(hr, hour);
          if (hrPt) lines.push(`<div style="color:var(--hr-color);font-size:0.7rem">HR: ${hrPt.v} bpm</div>`);
          const stPt = nearest(stress, hour);
          if (stPt) lines.push(`<div style="color:var(--stress-color);font-size:0.7rem">Stress: ${stPt.v}</div>`);
          const btPt = nearest(battery, hour);
          if (btPt) lines.push(`<div style="color:var(--battery-color);font-size:0.7rem">Battery: ${btPt.v}</div>`);
          const mvPt = nearest(movement, hour);
          if (mvPt) lines.push(`<div style="color:var(--accent);font-size:0.7rem">Movement: ${mvPt.v}</div>`);
          const rsPt = nearest(respiration, hour);
          if (rsPt) lines.push(`<div style="color:var(--resp-color);font-size:0.7rem">Resp: ${rsPt.v} brpm</div>`);

          const containerRect = container.getBoundingClientRect();
          const svgRect = svg.node().getBoundingClientRect();
          const scale = svgRect.width / width;
          const px = (mx * scale) + (svgRect.left - containerRect.left);
          const py = event.clientY - containerRect.top;
          tooltip.show(lines.join(''), px, py);
        });

        overlay.on('mouseleave', () => {
          crosshair.attr('opacity', 0);
          tooltip.hide();
        });

        function drawChannelHypnogram(svg, x, levels, yOff, height, margin, innerW) {
          const g = svg.append('g').attr('transform', `translate(0,${yOff})`);
          const pad = 4;
          const stageY = d3.scaleLinear().domain([0, 3]).range([height - pad, pad]);

          g.append('text')
            .attr('x', margin.left - 8)
            .attr('y', height / 2 + 2)
            .attr('text-anchor', 'end')
            .attr('class', 'channel-label')
            .text('STAGES');

          levels.forEach(l => {
            const stage = STAGE_Y_MAP[l.stage] != null ? STAGE_Y_MAP[l.stage] : 2;
            const x1 = x(l.start);
            const x2 = x(l.end);
            const y1 = stageY(stage);
            const rectH = height - pad - y1;
            g.append('rect')
              .attr('x', x1).attr('y', y1)
              .attr('width', Math.max(x2 - x1, 0.5))
              .attr('height', rectH)
              .attr('fill', stageColor(l.stage))
              .attr('opacity', 0.4);
          });

          const stepData = [];
          levels.forEach(l => {
            const stage = STAGE_Y_MAP[l.stage] != null ? STAGE_Y_MAP[l.stage] : 2;
            stepData.push({ h: l.start, stage });
            stepData.push({ h: l.end, stage });
          });
          if (stepData.length > 1) {
            g.append('path')
              .datum(stepData)
              .attr('d', d3.line().x(d => x(d.h)).y(d => stageY(d.stage)).curve(d3.curveStepAfter))
              .attr('fill', 'none')
              .attr('stroke', 'var(--text)')
              .attr('stroke-width', 1.2)
              .attr('stroke-opacity', 0.6);
          }

          g.append('line')
            .attr('x1', margin.left).attr('x2', margin.left + innerW)
            .attr('y1', height).attr('y2', height)
            .attr('stroke', 'var(--border-subtle)');
        }

        function drawChannelLine(svg, x, data, yOff, height, margin, label, color, fixedDomain, unit) {
          const g = svg.append('g').attr('transform', `translate(0,${yOff})`);
          const pad = 4;

          g.append('text')
            .attr('x', margin.left - 8)
            .attr('y', height / 2 + 2)
            .attr('text-anchor', 'end')
            .attr('class', 'channel-label')
            .text(label.toUpperCase());

          g.append('line')
            .attr('x1', margin.left).attr('x2', width - margin.right)
            .attr('y1', height).attr('y2', height)
            .attr('stroke', 'var(--border-subtle)');

          if (!data.length) {
            g.append('text')
              .attr('x', margin.left + innerW / 2)
              .attr('y', height / 2 + 3)
              .attr('text-anchor', 'middle')
              .attr('fill', 'var(--text-dim)')
              .attr('font-size', '9px')
              .text('No data');
            return;
          }

          const ext = fixedDomain || d3.extent(data, d => d.v);
          const p = (ext[1] - ext[0]) * 0.1 || 1;
          const y = d3.scaleLinear()
            .domain(fixedDomain || [ext[0] - p, ext[1] + p])
            .range([height - pad, pad]);

          g.append('path')
            .datum(data)
            .attr('d', d3.line().x(d => x(d.h)).y(d => y(d.v)).curve(d3.curveBasis))
            .attr('fill', 'none')
            .attr('stroke', color)
            .attr('stroke-width', 1.2)
            .attr('stroke-opacity', 0.8);

          const yAxis = d3.axisRight(y).ticks(2).tickSize(0);
          g.append('g')
            .attr('class', 'axis')
            .attr('transform', `translate(${width - margin.right + 4},0)`)
            .call(yAxis)
            .call(g => g.select('.domain').remove())
            .call(g => g.selectAll('.tick text')
              .attr('fill', color)
              .attr('font-size', '7px')
              .attr('opacity', 0.6));
        }

        function drawChannelArea(svg, x, data, yOff, height, margin, label, color, fixedDomain) {
          const g = svg.append('g').attr('transform', `translate(0,${yOff})`);
          const pad = 4;

          g.append('text')
            .attr('x', margin.left - 8)
            .attr('y', height / 2 + 2)
            .attr('text-anchor', 'end')
            .attr('class', 'channel-label')
            .text(label.toUpperCase());

          g.append('line')
            .attr('x1', margin.left).attr('x2', width - margin.right)
            .attr('y1', height).attr('y2', height)
            .attr('stroke', 'var(--border-subtle)');

          if (!data.length) {
            g.append('text')
              .attr('x', margin.left + innerW / 2)
              .attr('y', height / 2 + 3)
              .attr('text-anchor', 'middle')
              .attr('fill', 'var(--text-dim)')
              .attr('font-size', '9px')
              .text('No data');
            return;
          }

          const ext = fixedDomain || d3.extent(data, d => d.v);
          const y = d3.scaleLinear().domain(ext).range([height - pad, pad]);

          g.append('path')
            .datum(data)
            .attr('d', d3.area()
              .x(d => x(d.h))
              .y0(height - pad)
              .y1(d => y(d.v))
              .curve(d3.curveBasis))
            .attr('fill', color)
            .attr('opacity', 0.15);

          g.append('path')
            .datum(data)
            .attr('d', d3.line().x(d => x(d.h)).y(d => y(d.v)).curve(d3.curveBasis))
            .attr('fill', 'none')
            .attr('stroke', color)
            .attr('stroke-width', 1.2)
            .attr('stroke-opacity', 0.8);

          const yAxis = d3.axisRight(y).ticks(2).tickSize(0);
          g.append('g')
            .attr('class', 'axis')
            .attr('transform', `translate(${width - margin.right + 4},0)`)
            .call(yAxis)
            .call(g => g.select('.domain').remove())
            .call(g => g.selectAll('.tick text')
              .attr('fill', color)
              .attr('font-size', '7px')
              .attr('opacity', 0.6));
        }

        function drawChannelBars(svg, x, data, yOff, height, margin, label, color) {
          const g = svg.append('g').attr('transform', `translate(0,${yOff})`);
          const pad = 2;

          g.append('text')
            .attr('x', margin.left - 8)
            .attr('y', height / 2 + 2)
            .attr('text-anchor', 'end')
            .attr('class', 'channel-label')
            .text(label.toUpperCase());

          g.append('line')
            .attr('x1', margin.left).attr('x2', width - margin.right)
            .attr('y1', height).attr('y2', height)
            .attr('stroke', 'var(--border-subtle)');

          if (!data.length) {
            g.append('text')
              .attr('x', margin.left + innerW / 2)
              .attr('y', height / 2 + 3)
              .attr('text-anchor', 'middle')
              .attr('fill', 'var(--text-dim)')
              .attr('font-size', '9px')
              .text('No data');
            return;
          }

          const maxV = d3.max(data, d => d.v) || 1;
          const y = d3.scaleLinear().domain([0, maxV]).range([0, height - pad * 2]);

          data.forEach(d => {
            const barH = y(d.v);
            g.append('line')
              .attr('x1', x(d.h)).attr('x2', x(d.h))
              .attr('y1', height - pad).attr('y2', height - pad - barH)
              .attr('stroke', color)
              .attr('stroke-width', 1)
              .attr('stroke-opacity', 0.5);
          });
        }
      }

      searchInput.addEventListener('input', renderList);
      sortSelect.addEventListener('change', renderList);

      renderList();
    });
  </script>
</body>
</html>
