<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekday Heatmap — Sleep Viz</title>
  <link rel="stylesheet" href="../shared/style.css">
  <style>
    .legend-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-subtle);
    }

    .legend-bar-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .legend-bar canvas {
      height: 14px;
      width: 200px;
      border-radius: 3px;
    }

    .legend-bar-value {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .weekend-sep line {
      stroke: var(--accent-muted);
      stroke-width: 1;
      stroke-dasharray: 3 3;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="../shared/utils.js"></script>
  <script>
    document.body.innerHTML = pageShell(
      'Weekday <em>Heatmap</em>',
      'A calendar heatmap grid — 7 columns for each day of the week, rows for each week. Reveals weekly rhythm patterns and weekday vs weekend contrasts.',
      'Analytical'
    );

    const root = document.getElementById('viz-root');
    root.innerHTML = `
      <div class="stats-row" id="stats-row">
        <div class="stat"><div class="stat-value" id="stat-weekday">—</div><div class="stat-label">Weekday Avg</div></div>
        <div class="stat"><div class="stat-value" id="stat-weekend">—</div><div class="stat-label">Weekend Avg</div></div>
        <div class="stat"><div class="stat-value" id="stat-diff">—</div><div class="stat-label">Difference</div></div>
        <div class="stat"><div class="stat-value" id="stat-nights">—</div><div class="stat-label">Total Nights</div></div>
      </div>
      <div class="controls" id="controls"></div>
      <div class="viz-container">
        <div class="viz-canvas" id="canvas"><div class="loading">Loading sleep data</div></div>
        <div class="legend-bar" id="legend-bar">
          <span class="legend-bar-label" id="legend-min"></span>
          <canvas id="legend-canvas" width="200" height="14"></canvas>
          <span class="legend-bar-label" id="legend-max"></span>
        </div>
      </div>
    `;

    const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const DAY_LABELS = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];

    const METRICS = [
      { key: 'totalSleep', label: 'Total Sleep', fmt: v => formatDuration(v), unit: '' },
      { key: 'deep',       label: 'Deep Sleep',  fmt: v => formatDuration(v), unit: '' },
      { key: 'rem',        label: 'REM',          fmt: v => formatDuration(v), unit: '' },
      { key: 'efficiency', label: 'Efficiency',   fmt: v => v.toFixed(1) + '%', unit: '%' },
      { key: 'avgHR',      label: 'Avg HR',       fmt: v => Math.round(v) + ' bpm', unit: 'bpm' },
      { key: 'bodyBatteryChange', label: 'Body Battery', fmt: v => (v >= 0 ? '+' : '') + v, unit: '' },
      { key: 'bedtime',    label: 'Bedtime',      fmt: v => formatHour(v), unit: '' },
    ];

    function getColorScale(key, values) {
      const valid = values.filter(v => v != null && !isNaN(v));
      if (!valid.length) return d3.scaleSequential(d3.interpolateBlues).domain([0, 1]);

      const lo = d3.min(valid);
      const hi = d3.max(valid);

      if (key === 'totalSleep' || key === 'deep' || key === 'rem') {
        return d3.scaleSequential(d3.interpolateBlues).domain([lo, hi]);
      }
      if (key === 'efficiency') {
        return d3.scaleSequential(d3.interpolateGreens).domain([lo, hi]);
      }
      if (key === 'avgHR') {
        return d3.scaleSequential(d3.interpolateYlOrRd).domain([lo, hi]);
      }
      if (key === 'bodyBatteryChange') {
        const absMax = Math.max(Math.abs(lo), Math.abs(hi));
        return d3.scaleDiverging(d3.interpolateRdYlGn).domain([-absMax, 0, absMax]);
      }
      if (key === 'bedtime') {
        return d3.scaleSequential(d3.interpolatePurples).domain([lo, hi]);
      }
      return d3.scaleSequential(d3.interpolateBlues).domain([lo, hi]);
    }

    let currentMetric = 'totalSleep';

    loadData('summary.json').then(summary => {
      summary.forEach(d => {
        d._date = new Date(d.date + 'T12:00:00');
      });
      summary.sort((a, b) => a._date - b._date);

      const firstDate = summary[0]._date;
      const dayIndex = (firstDate.getDay() + 6) % 7;
      const mondayOfFirstWeek = new Date(firstDate);
      mondayOfFirstWeek.setDate(mondayOfFirstWeek.getDate() - dayIndex);

      const lastDate = summary[summary.length - 1]._date;
      const lastDayIndex = (lastDate.getDay() + 6) % 7;
      const sundayOfLastWeek = new Date(lastDate);
      sundayOfLastWeek.setDate(sundayOfLastWeek.getDate() + (6 - lastDayIndex));

      const totalWeeks = Math.round((sundayOfLastWeek - mondayOfFirstWeek) / (7 * 864e5)) + 1;

      const dateMap = new Map(summary.map(d => [d.date, d]));

      const grid = [];
      for (let w = 0; w < totalWeeks; w++) {
        const row = [];
        for (let d = 0; d < 7; d++) {
          const cellDate = new Date(mondayOfFirstWeek);
          cellDate.setDate(cellDate.getDate() + w * 7 + d);
          const key = cellDate.toISOString().slice(0, 10);
          row.push(dateMap.get(key) || null);
        }
        grid.push(row);
      }

      function getWeekLabel(weekIdx) {
        const d = new Date(mondayOfFirstWeek);
        d.setDate(d.getDate() + weekIdx * 7);
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      }

      const cellW = 40;
      const cellH = 30;
      const gap = 2;
      const marginLeft = 70;
      const marginTop = 28;
      const marginRight = 16;
      const marginBottom = 16;
      const weekendGap = 6;

      function colX(col) {
        const extra = col >= 5 ? weekendGap : 0;
        return marginLeft + col * (cellW + gap) + extra;
      }

      const svgW = colX(6) + cellW + marginRight;
      const svgH = marginTop + totalWeeks * (cellH + gap) + marginBottom;

      const canvas = document.getElementById('canvas');
      const tooltip = createTooltip(canvas.closest('.viz-container'));

      const controlsEl = document.getElementById('controls');
      METRICS.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'control-btn' + (m.key === currentMetric ? ' active' : '');
        btn.textContent = m.label;
        btn.addEventListener('click', () => {
          currentMetric = m.key;
          controlsEl.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          render();
        });
        controlsEl.appendChild(btn);
      });

      function render() {
        canvas.innerHTML = '';

        const metric = METRICS.find(m => m.key === currentMetric);
        const allValues = summary.map(d => d[currentMetric]).filter(v => v != null && !isNaN(v));
        const colorScale = getColorScale(currentMetric, allValues);

        const svg = d3.select(canvas)
          .append('svg')
          .attr('viewBox', `0 0 ${svgW} ${svgH}`)
          .attr('width', '100%')
          .attr('preserveAspectRatio', 'xMidYMid meet');

        DAYS.forEach((day, i) => {
          const isWeekend = i >= 5;
          svg.append('text')
            .attr('x', colX(i) + cellW / 2)
            .attr('y', marginTop - 10)
            .attr('text-anchor', 'middle')
            .attr('fill', isWeekend ? 'var(--accent)' : 'var(--text-dim)')
            .attr('font-weight', isWeekend ? '500' : '400')
            .style('font-size', '11px')
            .text(DAY_LABELS[i]);
        });

        const sepX = colX(5) - (weekendGap + gap) / 2;
        svg.append('line')
          .attr('x1', sepX)
          .attr('y1', marginTop - 2)
          .attr('x2', sepX)
          .attr('y2', marginTop + totalWeeks * (cellH + gap) - gap)
          .attr('stroke', 'var(--accent-muted)')
          .attr('stroke-width', 1)
          .attr('stroke-dasharray', '3 3')
          .attr('opacity', 0.35);

        grid.forEach((row, wi) => {
          const y = marginTop + wi * (cellH + gap);

          if (wi % 4 === 0) {
            svg.append('text')
              .attr('x', marginLeft - 10)
              .attr('y', y + cellH / 2)
              .attr('text-anchor', 'end')
              .attr('dominant-baseline', 'central')
              .attr('fill', 'var(--text-dim)')
              .style('font-size', '9px')
              .style('font-family', 'var(--font-mono)')
              .text(getWeekLabel(wi));
          }

          row.forEach((d, di) => {
            const x = colX(di);
            const isWeekend = di >= 5;

            if (!d) {
              svg.append('rect')
                .attr('x', x).attr('y', y)
                .attr('width', cellW).attr('height', cellH)
                .attr('rx', 3)
                .attr('fill', '#0e0e16')
                .attr('stroke', 'var(--border-subtle)')
                .attr('stroke-width', 0.5);
              return;
            }

            const val = d[currentMetric];
            const hasVal = val != null && !isNaN(val);
            const fill = hasVal ? colorScale(val) : '#0e0e16';

            const rect = svg.append('rect')
              .attr('x', x).attr('y', y)
              .attr('width', cellW).attr('height', cellH)
              .attr('rx', 3)
              .attr('fill', fill)
              .attr('stroke', isWeekend ? 'rgba(139,92,246,0.2)' : 'transparent')
              .attr('stroke-width', isWeekend ? 1 : 0)
              .style('cursor', 'pointer')
              .style('transition', 'opacity 0.15s');

            rect
              .on('mouseenter', function(event) {
                d3.select(this).attr('opacity', 0.8);
                const lines = [
                  `<div class="tooltip-label">${formatDateLong(d.date)}</div>`,
                  `<div style="margin-top:4px"><span class="tooltip-label">${metric.label}:</span> <span class="tooltip-value">${hasVal ? metric.fmt(val) : '—'}</span></div>`,
                  `<div style="margin-top:2px; font-size:0.65rem; color:var(--text-dim)">`,
                  `Sleep ${formatDuration(d.totalSleep)} · Eff ${d.efficiency != null ? d.efficiency.toFixed(0) + '%' : '—'}`,
                  d.deep != null ? ` · Deep ${formatDuration(d.deep)}` : '',
                  d.rem != null ? ` · REM ${formatDuration(d.rem)}` : '',
                  `</div>`,
                ];
                const containerRect = canvas.closest('.viz-container').getBoundingClientRect();
                const svgEl = canvas.querySelector('svg');
                const svgRect = svgEl.getBoundingClientRect();
                const scaleX = svgRect.width / svgW;
                const scaleY = svgRect.height / svgH;
                const px = (x + cellW / 2) * scaleX + svgRect.left - containerRect.left;
                const py = y * scaleY + svgRect.top - containerRect.top;
                tooltip.show(lines.join(''), px, py);
              })
              .on('mouseleave', function() {
                d3.select(this).attr('opacity', 1);
                tooltip.hide();
              });
          });
        });

        updateLegend(colorScale, allValues, metric);
        updateStats(metric, allValues);
      }

      function updateLegend(colorScale, values, metric) {
        const canvasEl = document.getElementById('legend-canvas');
        const ctx = canvasEl.getContext('2d');
        const w = canvasEl.width;
        const h = canvasEl.height;
        ctx.clearRect(0, 0, w, h);

        const lo = d3.min(values);
        const hi = d3.max(values);
        if (lo == null || hi == null) return;

        for (let i = 0; i < w; i++) {
          const t = lo + (hi - lo) * (i / (w - 1));
          ctx.fillStyle = colorScale(t);
          ctx.fillRect(i, 0, 1, h);
        }

        document.getElementById('legend-min').textContent = metric.fmt(lo);
        document.getElementById('legend-max').textContent = metric.fmt(hi);
      }

      function updateStats(metric, allValues) {
        const weekdayVals = summary
          .filter(d => !['Sat', 'Sun'].includes(d.dayOfWeek))
          .map(d => d[currentMetric])
          .filter(v => v != null && !isNaN(v));
        const weekendVals = summary
          .filter(d => ['Sat', 'Sun'].includes(d.dayOfWeek))
          .map(d => d[currentMetric])
          .filter(v => v != null && !isNaN(v));

        const wdAvg = weekdayVals.length ? d3.mean(weekdayVals) : null;
        const weAvg = weekendVals.length ? d3.mean(weekendVals) : null;

        document.getElementById('stat-weekday').textContent = wdAvg != null ? metric.fmt(wdAvg) : '—';
        document.getElementById('stat-weekend').textContent = weAvg != null ? metric.fmt(weAvg) : '—';

        if (wdAvg != null && weAvg != null) {
          const diff = weAvg - wdAvg;
          const prefix = diff >= 0 ? '+' : '-';
          const formatted = metric.fmt(Math.abs(diff));
          document.getElementById('stat-diff').textContent = prefix + formatted;
        } else {
          document.getElementById('stat-diff').textContent = '—';
        }

        document.getElementById('stat-nights').textContent = allValues.length;
      }

      render();
    });
  </script>
</body>
</html>
